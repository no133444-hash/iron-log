<!DOCTYPE html>
<html lang="zh-Hant" class="[scrollbar-gutter:stable]" style="background:#F2F4F1">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F2F4F1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>鐵量日誌 IRON LOG</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;900&family=Work+Sans:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2F4F1; --card:#FFFFFF; --card2:#EAEDE8; --line:#DCE2DB;
    --ink:#262B28; --muted:#737F76; --accent:#4F7A6E; --accent-soft:#E3ECE8;
    --gold:#B8935B; --gold-soft:#F3EADA; --danger:#B5695F; --danger-soft:#F5E9E7;
  }
  html{ background:var(--bg); }
  body{
    font-family:'Work Sans','Noto Sans TC',sans-serif; background:var(--bg); color:var(--ink);
    -webkit-tap-highlight-color:transparent;
    background-image:
      radial-gradient(ellipse 600px 300px at 50% -5%, rgba(79,122,110,.06), transparent 60%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/></svg>");
  }
  .num{ font-family:'Big Shoulders Display','Work Sans','Noto Sans TC',sans-serif; font-variant-numeric:tabular-nums; }
  .display{ font-family:'Big Shoulders Display','Noto Sans TC',sans-serif; letter-spacing:.01em; }
  .tab-panel{ display:none; }
  .tab-panel.active{ display:block; }
  .nav-btn{ color:var(--muted); transition:color .15s; }
  .nav-btn.active{ color:var(--accent); }
  .nav-btn.active .nav-bar{ opacity:1; }
  .nav-bar{ opacity:0; transition:opacity .15s; }
  .ex-btn{ background:var(--card); border:1px solid var(--line); color:var(--ink); }
  .ex-btn.active{ background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }
  .equip-btn{ background:var(--card2); border:1px solid var(--line); color:var(--ink); transition:background .12s,color .12s; }
  .equip-btn.active{ background:var(--accent); border-color:var(--accent); color:#fff; }
  input,select,textarea{ background:var(--card2); border:1px solid var(--line); color:var(--ink);
    border-radius:.75rem; outline:none; }
  input:focus,select:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  input[type="date"]{ color-scheme:light; }
  summary{ list-style:none; }
  summary::-webkit-details-marker{ display:none; }
  summary::marker{ content:""; }
  .chev{ display:inline-block; transition:transform .15s ease; color:var(--muted); }
  details[open] > summary .chev{ transform:rotate(180deg); }
  .stepper{ background:var(--card2); border:1px solid var(--line); color:var(--ink); user-select:none;
    -webkit-user-select:none; touch-action:manipulation; }
  .stepper:active{ background:var(--line); }
  .plate{ display:inline-flex; align-items:center; justify-content:center;
    border-radius:9999px; font-family:'Big Shoulders Display',sans-serif; font-weight:700;
    border:2px solid rgba(38,43,40,.08); }
  .cat-icon{ color:var(--accent); }
  .fadein{ animation:fi .25s ease; }
  @keyframes fi{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;} }
  @media (prefers-reduced-motion:reduce){ .fadein{ animation:none; } .chev{ transition:none; } }
  ::-webkit-scrollbar{ width:0; height:0; }
  .sync-pill{ display:inline-flex; align-items:center; gap:3px; font-size:10px; font-weight:600;
    padding:2px 8px; border-radius:9999px; white-space:nowrap; transition:background .2s,color .2s; }
</style>
</head>
<body class="min-h-screen">
<div class="max-w-md mx-auto px-4 pt-[calc(env(safe-area-inset-top)+0.75rem)] pb-28">

  <!-- Header -->
  <header class="flex items-end justify-between mb-3">
    <div>
      <div class="display text-[10px] tracking-[0.35em] font-bold" style="color:var(--accent)">IRON LOG</div>
      <h1 class="display text-2xl font-black tracking-wide">鐵量日誌</h1>
    </div>
    <div class="text-right">
      <div class="text-[10px]" style="color:var(--muted)">今日</div>
      <div id="hdrDate" class="num text-sm font-bold"></div>
      <div id="syncPill" class="sync-pill mt-1" style="background:var(--card2);color:var(--muted)">⚠️ 離線 / 未同步</div>
    </div>
  </header>

  <div class="flex gap-2 mb-4">
    <button id="btnExport" class="flex-1 py-2 rounded-xl text-xs font-bold" style="background:var(--card2);border:1px solid var(--line)">⬇ 匯出備份</button>
    <label class="flex-1 py-2 rounded-xl text-xs font-bold text-center cursor-pointer" style="background:var(--card2);border:1px solid var(--line)">
      ⬆ 匯入備份<input id="importFile" type="file" accept=".json" class="hidden">
    </label>
  </div>

  <!-- ============ Tab: 記錄 ============ -->
  <div id="tab-log" class="tab-panel active">

    <div class="rounded-2xl p-4 mb-4" style="background:var(--card);border:1px solid var(--line)">
      <label class="text-xs font-medium" style="color:var(--muted)">訓練日期</label>
      <input id="logDate" type="date" class="w-full mt-1 px-3 py-3 text-base num font-bold">

      <div class="mt-4">
        <div class="flex items-center justify-between">
          <label class="text-xs font-medium" style="color:var(--muted)">訓練動作</label>
          <button id="goManageEx" class="text-xs font-medium" style="color:var(--accent)">管理動作 ›</button>
        </div>
        <div id="selectedExDisplay" class="text-sm font-bold mt-1.5 mb-2"></div>
        <div id="equipToggle" class="grid grid-cols-2 gap-2 mb-2"></div>
        <div id="exPicker" class="space-y-2"></div>
      </div>

      <!-- 重量 -->
      <div class="mt-5">
        <label class="text-xs font-medium" style="color:var(--muted)">重量 (kg)</label>
        <div class="flex items-stretch gap-2 mt-1">
          <button class="stepper rounded-xl w-14 text-xl font-bold num" data-step="w" data-delta="-2.5">−</button>
          <input id="inWeight" type="text" inputmode="decimal" class="flex-1 text-center num text-3xl font-black py-2" value="60">
          <button class="stepper rounded-xl w-14 text-xl font-bold num" data-step="w" data-delta="2.5">＋</button>
        </div>
        <div class="flex flex-wrap gap-1.5 mt-2">
          <button class="stepper rounded-lg px-2.5 py-1 text-xs num" data-step="w" data-delta="-10">−10</button>
          <button class="stepper rounded-lg px-2.5 py-1 text-xs num" data-step="w" data-delta="-5">−5</button>
          <button class="stepper rounded-lg px-2.5 py-1 text-xs num" data-step="w" data-delta="-2.5">−2.5</button>
          <button class="stepper rounded-lg px-2.5 py-1 text-xs num" data-step="w" data-delta="2.5">＋2.5</button>
          <button class="stepper rounded-lg px-2.5 py-1 text-xs num" data-step="w" data-delta="5">＋5</button>
          <button class="stepper rounded-lg px-2.5 py-1 text-xs num" data-step="w" data-delta="10">＋10</button>
        </div>
      </div>

      <!-- 槓片配置（招牌功能） -->
      <details class="mt-3">
        <summary class="flex items-center justify-between py-2 cursor-pointer">
          <span class="text-xs font-medium" style="color:var(--muted)">🏋 槓片配置（單邊，槓 20kg）</span>
          <span class="chev text-xs">▾</span>
        </summary>
        <div id="plateCalc" class="flex flex-wrap items-center gap-1.5 py-2"></div>
      </details>

      <!-- 次數 / 組數 -->
      <div class="grid grid-cols-2 gap-3 mt-4">
        <div>
          <label class="text-xs font-medium" style="color:var(--muted)">次數 / 組</label>
          <div class="flex items-stretch gap-1.5 mt-1">
            <button class="stepper rounded-xl w-11 text-lg font-bold num" data-step="r" data-delta="-1">−</button>
            <input id="inReps" type="text" inputmode="numeric" class="flex-1 min-w-0 text-center num text-xl font-black py-2" value="8">
            <button class="stepper rounded-xl w-11 text-lg font-bold num" data-step="r" data-delta="1">＋</button>
          </div>
        </div>
        <div>
          <label class="text-xs font-medium" style="color:var(--muted)">組數</label>
          <div class="flex items-stretch gap-1.5 mt-1">
            <button class="stepper rounded-xl w-11 text-lg font-bold num" data-step="s" data-delta="-1">−</button>
            <input id="inSets" type="text" inputmode="numeric" class="flex-1 min-w-0 text-center num text-xl font-black py-2" value="3">
            <button class="stepper rounded-xl w-11 text-lg font-bold num" data-step="s" data-delta="1">＋</button>
          </div>
        </div>
      </div>

      <input id="inNote" type="text" class="w-full mt-4 px-3 py-2.5 text-sm" placeholder="備註（選填，例如：RPE 8、有補手）">

      <button id="btnAdd" class="w-full mt-4 py-3.5 rounded-xl display font-black text-lg tracking-widest"
        style="background:var(--accent);color:#fff">＋ 記錄這一筆</button>
    </div>

    <!-- 當日已記錄 -->
    <h2 class="display font-bold text-sm tracking-wider mb-2">訓練紀錄</h2>
    <div id="todayList" class="space-y-2"></div>
  </div>

  <!-- ============ Tab: 歷史 ============ -->
  <div id="tab-history" class="tab-panel">
    <h2 class="display font-bold text-sm tracking-wider mb-3">訓練歷史</h2>
    <div id="historyList" class="space-y-2"></div>
  </div>

  <!-- ============ Tab: 統計 ============ -->
  <div id="tab-stats" class="tab-panel">
    <h2 class="display font-bold text-sm tracking-wider mb-3">近 8 週訓練量 (kg)</h2>
    <div class="rounded-2xl p-4 mb-5" style="background:var(--card);border:1px solid var(--line)">
      <div id="weeklyChart"></div>
    </div>
    <h2 class="display font-bold text-sm tracking-wider mb-3">各動作最佳紀錄</h2>
    <div id="prList" class="space-y-2"></div>
  </div>

  <!-- ============ Tab: 管理 ============ -->
  <div id="tab-manage" class="tab-panel">
    <h2 class="display font-bold text-sm tracking-wider mb-3">動作分類管理</h2>
    <div id="manageEquipToggle" class="grid grid-cols-2 gap-2 mb-3"></div>
    <div id="exManageList" class="space-y-2 mb-8"></div>

    <h2 class="display font-bold text-sm tracking-wider mb-3">新增動作</h2>
    <div class="rounded-2xl p-4 mb-5" style="background:var(--card);border:1px solid var(--line)">
      <label class="text-xs font-medium" style="color:var(--muted)">器材</label>
      <select id="newExEquip" class="w-full mt-1 px-3 py-2.5 text-sm"></select>

      <div id="newExCatWrap" class="mt-3">
        <label class="text-xs font-medium" style="color:var(--muted)">分類</label>
        <select id="newExCat" class="w-full mt-1 px-3 py-2.5 text-sm"></select>
      </div>

      <label class="text-xs font-medium mt-3 block" style="color:var(--muted)">動作名稱</label>
      <input id="newExName" type="text" class="w-full mt-1 px-3 py-2.5 text-sm" placeholder="例如：波比跳">
      <button id="btnAddEx" class="w-full mt-2.5 py-2.5 rounded-xl font-bold text-sm" style="background:var(--accent);color:#fff">＋ 新增動作</button>

      <div class="mt-4 pt-4" style="border-top:1px dashed var(--line)">
        <label class="text-xs font-medium" style="color:var(--muted)">批次匯入／匯出（Excel）</label>
        <p class="text-xs leading-relaxed mt-1 mb-2.5" style="color:var(--muted)">下載目前的動作庫成 Excel，編輯後再上傳；上傳時可選擇「覆蓋」或「只新增現有以外的動作」。</p>
        <div class="flex gap-2">
          <button id="btnExportExercisesExcel" class="flex-1 py-2.5 rounded-xl text-sm font-bold" style="background:var(--card2);border:1px solid var(--line)">⬇ 下載 Excel</button>
          <label class="flex-1 py-2.5 rounded-xl text-sm font-bold text-center cursor-pointer" style="background:var(--card2);border:1px solid var(--line)">
            ⬆ 上傳 Excel<input id="importExerciseExcelFile" type="file" accept=".xlsx,.xls" class="hidden">
          </label>
        </div>
      </div>
    </div>

    <h2 class="display font-bold text-sm tracking-wider mb-3">清除資料</h2>
    <div class="rounded-2xl p-4" style="background:var(--card);border:1px solid var(--line)">
      <p class="text-xs leading-relaxed mb-3" style="color:var(--muted)">資料儲存在此瀏覽器與雲端。清除前建議先於最上方按「⬇ 匯出備份」保存一份。</p>
      <button id="btnWipe" class="w-full py-2.5 rounded-xl text-sm font-bold" style="background:var(--danger-soft);border:1px solid var(--danger);color:var(--danger)">清除全部資料</button>
    </div>
  </div>
</div>

<!-- 底部導覽列 -->
<nav class="fixed bottom-0 left-0 right-0 z-30" style="background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line)">
  <div class="max-w-md mx-auto grid grid-cols-4 pb-[env(safe-area-inset-bottom)]">
    <button class="nav-btn active py-2.5 flex flex-col items-center gap-0.5" data-tab="log">
      <span class="text-xl leading-none">✏️</span><span class="text-[10px] font-medium">記錄</span>
      <span class="nav-bar h-0.5 w-6 rounded-full" style="background:var(--accent)"></span>
    </button>
    <button class="nav-btn py-2.5 flex flex-col items-center gap-0.5" data-tab="history">
      <span class="text-xl leading-none">📅</span><span class="text-[10px] font-medium">歷史</span>
      <span class="nav-bar h-0.5 w-6 rounded-full" style="background:var(--accent)"></span>
    </button>
    <button class="nav-btn py-2.5 flex flex-col items-center gap-0.5" data-tab="stats">
      <span class="text-xl leading-none">📈</span><span class="text-[10px] font-medium">統計</span>
      <span class="nav-bar h-0.5 w-6 rounded-full" style="background:var(--accent)"></span>
    </button>
    <button class="nav-btn py-2.5 flex flex-col items-center gap-0.5" data-tab="manage">
      <span class="text-xl leading-none">⚙️</span><span class="text-[10px] font-medium">管理</span>
      <span class="nav-bar h-0.5 w-6 rounded-full" style="background:var(--accent)"></span>
    </button>
  </div>
</nav>

<!-- 自訂對話框：取代 prompt/confirm/alert，避免在「加入主畫面」模式下失效 -->
<div id="modalOverlay" class="fixed inset-0 z-50 hidden items-center justify-center p-5" style="background:rgba(38,43,40,.4)">
  <div class="w-full max-w-sm rounded-2xl p-5" style="background:var(--card)">
    <h3 id="modalTitle" class="font-bold text-base mb-1.5"></h3>
    <p id="modalMessage" class="text-sm mb-3 whitespace-pre-line" style="color:var(--muted)"></p>
    <input id="modalInput" type="text" class="w-full px-3 py-2.5 text-sm mb-3 hidden">
    <div id="modalBtnRow" class="flex gap-2">
      <button id="modalCancelBtn" class="flex-1 py-2.5 rounded-xl text-sm font-bold" style="background:var(--card2);border:1px solid var(--line)">取消</button>
      <button id="modalThirdBtn" class="flex-1 py-2.5 rounded-xl text-sm font-bold hidden" style="background:var(--accent);color:#fff">選項</button>
      <button id="modalConfirmBtn" class="flex-1 py-2.5 rounded-xl text-sm font-bold" style="background:var(--accent);color:#fff">確定</button>
    </div>
  </div>
</div>

<!-- 編輯訓練紀錄用的對話框 -->
<div id="editLogOverlay" class="fixed inset-0 z-50 hidden items-center justify-center p-5" style="background:rgba(38,43,40,.4)">
  <div class="w-full max-w-sm rounded-2xl p-5 space-y-3" style="background:var(--card)">
    <h3 class="font-bold text-base">編輯訓練紀錄</h3>

    <div>
      <label class="text-xs font-medium" style="color:var(--muted)">日期</label>
      <input id="editLogDate" type="date" class="w-full mt-1 px-3 py-2.5 text-sm num">
    </div>
    <div>
      <label class="text-xs font-medium" style="color:var(--muted)">動作</label>
      <select id="editLogEx" class="w-full mt-1 px-3 py-2.5 text-sm"></select>
    </div>
    <div class="grid grid-cols-3 gap-2">
      <div>
        <label class="text-xs font-medium" style="color:var(--muted)">重量(kg)</label>
        <input id="editLogWeight" type="text" inputmode="decimal" class="w-full mt-1 px-2 py-2.5 text-sm text-center num">
      </div>
      <div>
        <label class="text-xs font-medium" style="color:var(--muted)">次數</label>
        <input id="editLogReps" type="text" inputmode="numeric" class="w-full mt-1 px-2 py-2.5 text-sm text-center num">
      </div>
      <div>
        <label class="text-xs font-medium" style="color:var(--muted)">組數</label>
        <input id="editLogSets" type="text" inputmode="numeric" class="w-full mt-1 px-2 py-2.5 text-sm text-center num">
      </div>
    </div>
    <div>
      <label class="text-xs font-medium" style="color:var(--muted)">備註</label>
      <input id="editLogNote" type="text" class="w-full mt-1 px-3 py-2.5 text-sm">
    </div>

    <div class="flex gap-2 pt-1">
      <button id="editLogCancelBtn" class="flex-1 py-2.5 rounded-xl text-sm font-bold" style="background:var(--card2);border:1px solid var(--line)">取消</button>
      <button id="editLogSaveBtn" class="flex-1 py-2.5 rounded-xl text-sm font-bold" style="background:var(--accent);color:#fff">儲存</button>
    </div>
    <button id="editLogDeleteBtn" class="w-full py-2 rounded-xl text-xs font-bold" style="background:var(--danger-soft);color:var(--danger)">刪除這筆紀錄</button>
  </div>
</div>

<script>
"use strict";
const STORAGE_KEY = "ironLogData_v3";
const LEGACY_KEYS = ["ironLogData_v2", "ironLogData_v1"];

/* 器材：槓鈴／啞鈴需先選四大分類；爆發動作／壺鈴直接對應動作清單 */
const EQUIPS = [
  { id:"barbell",    label:"槓鈴",    grouped:true  },
  { id:"dumbbell",   label:"啞鈴",    grouped:true  },
  { id:"explosive",  label:"爆發動作", grouped:false },
  { id:"kettlebell", label:"壺鈴",    grouped:false }
];
function equipIcon(eq){
  if(eq.id === "barbell"){
    return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="9" x2="3" y2="15"/>
      <line x1="21" y1="9" x2="21" y2="15"/>
      <line x1="6.5" y1="10" x2="6.5" y2="14"/>
      <line x1="17.5" y1="10" x2="17.5" y2="14"/>
    </svg>`;
  }
  if(eq.id === "dumbbell"){
    return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <line x1="9" y1="12" x2="15" y2="12"/>
      <circle cx="5" cy="12" r="3"/>
      <circle cx="19" cy="12" r="3"/>
    </svg>`;
  }
  if(eq.id === "kettlebell"){
    return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8.5 10.5c0-3 1.6-6 3.5-6s3.5 3 3.5 6"/>
      <circle cx="12" cy="15" r="6"/>
    </svg>`;
  }
  return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round">
    <path d="M13 2 L6 14 H11 L10 22 L18 10 H13 Z"/>
  </svg>`;
}

/* 動作分類：pos(上肢/下肢) + dir(推/拉) 系統化決定圖示畫法（僅槓鈴／啞鈴使用） */
const CATS = [
  { id:"upper_push", label:"上肢推", pos:"upper", dir:"push" },
  { id:"upper_pull", label:"上肢拉", pos:"upper", dir:"pull" },
  { id:"lower_push", label:"下肢推", pos:"lower", dir:"push" },
  { id:"lower_pull", label:"下肢拉", pos:"lower", dir:"pull" }
];
function catIcon(cat){
  const barY = cat.pos==="upper" ? 7 : 17;
  const y1 = cat.pos==="upper" ? 15 : 9;
  const y2 = cat.pos==="upper" ? 18 : 6;
  const path = cat.dir==="push"
    ? `M9 ${y1} L6 ${y2} M15 ${y1} L18 ${y2}`
    : `M7 ${y1} L10 ${y2} M17 ${y1} L14 ${y2}`;
  return `<svg class="cat-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <line x1="4" y1="${barY}" x2="20" y2="${barY}"/>
    <line x1="4" y1="${barY-2.5}" x2="4" y2="${barY+2.5}"/>

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function escHtml(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* ---------- 自訂對話框（取代 prompt/confirm/alert） ----------
   iOS「加入主畫面」的獨立模式下，原生 prompt() 常被靜默阻擋、confirm() 也不穩定，
   改用畫面內的對話框，回傳 Promise：取消時 resolve(null)，確定時 resolve(輸入值或 true) */
const modalOverlay = document.getElementById("modalOverlay");
const modalTitle = document.getElementById("modalTitle");
const modalMessage = document.getElementById("modalMessage");
const modalInput = document.getElementById("modalInput");
const modalBtnRow = document.getElementById("modalBtnRow");
const modalCancelBtn = document.getElementById("modalCancelBtn");
const modalThirdBtn = document.getElementById("modalThirdBtn");
const modalConfirmBtn = document.getElementById("modalConfirmBtn");
let modalResolve = null;

function closeModal(result){
  modalOverlay.classList.add("hidden");
  modalOverlay.classList.remove("flex");
  if(modalResolve){ modalResolve(result); modalResolve = null; }
}
modalOverlay.addEventListener("click", e=>{ if(e.target===modalOverlay) closeModal(null); });
modalCancelBtn.addEventListener("click", ()=> closeModal(null));
modalThirdBtn.addEventListener("click", ()=> closeModal("third"));
modalConfirmBtn.addEventListener("click", ()=>{
  const usesInput = !modalInput.classList.contains("hidden");
  closeModal(usesInput ? modalInput.value : true);
});
modalInput.addEventListener("keydown", e=>{ if(e.key==="Enter") modalConfirmBtn.click(); });

function showModal({ title, message="", input=false, defaultValue="", confirmText="確定", cancelText="取消", danger=false, onlyOk=false, thirdText=null }){
  return new Promise(resolve=>{
    modalResolve = resolve;
    modalTitle.textContent = title;
    modalMessage.textContent = message;
    modalMessage.style.display = message ? "" : "none";
    if(input){
      modalInput.classList.remove("hidden");
      modalInput.value = defaultValue;
    } else {
      modalInput.classList.add("hidden");
    }
    modalConfirmBtn.textContent = confirmText;
    modalConfirmBtn.style.background = danger ? "var(--danger)" : "var(--accent)";
    modalCancelBtn.style.display = onlyOk ? "none" : "";
    modalCancelBtn.textContent = cancelText;
    if(thirdText){
      modalThirdBtn.textContent = thirdText;
      modalThirdBtn.classList.remove("hidden");
      modalBtnRow.classList.remove("flex-row");
      modalBtnRow.classList.add("flex-col");
    } else {
      modalThirdBtn.classList.add("hidden");
      modalBtnRow.classList.remove("flex-col");
      modalBtnRow.classList.add("flex-row");
    }
    modalOverlay.classList.remove("hidden");
    modalOverlay.classList.add("flex");
    if(input) setTimeout(()=>{ modalInput.focus(); modalInput.select(); }, 50);
  });
}
function showAlert(message, title=""){ return showModal({ title, message, onlyOk:true }); }
function showConfirm(message, { title="", confirmText="確定", danger=false } = {}){
  return showModal({ title, message, confirmText, danger });
}
function showPrompt(message, defaultValue="", { title="", confirmText="儲存" } = {}){
  return showModal({ title, message, input:true, defaultValue, confirmText });
}
function todayStr(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function fmtDate(iso){
  const [y,m,d] = iso.split("-");
  const wd = "日一二三四五六"[new Date(iso+"T00:00:00").getDay()];
  return `${y}/${m}/${d}（${wd}）`;
}
function equipObj(id){ return EQUIPS.find(e=>e.id===id) || EQUIPS[0]; }

function getDefaultState(){
  const mk = (n,cat,equip) => ({ id: uid(), name:n, cat, equip });
  return {

      mk("槓鈴臥推","upper_push","barbell"),

    ],
    logs: [], // {id, date:"YYYY-MM-DD", exId, weight, reps, sets, note}
    updatedAt: Date.now()
  };
}

function sanitizeState(s){
  const validCats = CATS.map(c=>c.id);
  const validEquips = EQUIPS.map(e=>e.id);
  s.exercises.forEach(e=>{
    if(!validCats.includes(e.cat)) e.cat = CATS[0].id;
    if(!validEquips.includes(e.equip)) e.equip = EQUIPS[0].id;
  });
  if(typeof s.updatedAt !== "number") s.updatedAt = 0;
  return s;
}

function loadData(){
  let s = null;
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw){ try{ s = JSON.parse(raw); }catch(e){} }
  if(!s || !s.exercises || !s.logs){
    for(const key of LEGACY_KEYS){
      const legacy = localStorage.getItem(key);
      if(legacy){
        try{ const parsed = JSON.parse(legacy); if(parsed && parsed.exercises && parsed.logs){ s = parsed; break; } }catch(e){}
      }
    }
  }
  if(!s || !s.exercises || !s.logs) s = getDefaultState();
  return sanitizeState(s);
}

  persistLocal();
  schedulePush();
}

/* ---------- 槓片計算 ---------- */
const PLATES = [
  {w:25,  c:"#C75A52", t:"#FFFFFF"},
  {w:20,  c:"#4A6FA0", t:"#FFFFFF"},
  {w:15,  c:"#D9AE55", t:"#2B2E2A"},
  {w:10,  c:"#5A9A6C", t:"#FFFFFF"},
  {w:5,   c:"#ECECE9", t:"#2B2E2A"},
  {w:2.5, c:"#33383A", t:"#F5F6F4"},
  {w:1.25,c:"#A8ADB3", t:"#2B2E2A"}
];
function renderPlateCalc(){
  const box = document.getElementById("plateCalc");
  const total = parseFloat(document.getElementById("inWeight").value) || 0;
  const BAR = 20;
  if(total < BAR){
    box.innerHTML = `<span class="text-xs" style="color:var(--muted)">重量低於空槓 ${BAR}kg（或使用啞鈴／機械式）</span>`;
    return;
  }
  let side = (total - BAR) / 2;
  const used = [];
  PLATES.forEach(p=>{ while(side >= p.w - 1e-9){ used.push(p); side -= p.w; } });
  let html = `<span class="text-xs num mr-1" style="color:var(--muted)">槓20</span>`;
  html += used.map(p=>{
    const size = 30 + Math.round(p.w*0.9);
    return `<span class="plate" style="width:${size}px;height:${size}px;background:${p.c};color:${p.t};font-size:${p.w>=10?11:9}px">${p.w}</span>`;
  }).join("");
  if(side > 0.01) html += `<span class="text-xs num ml-1" style="color:var(--danger)">餘 ${side.toFixed(2)}kg 無法配片</span>`;
  if(!used.length) html += `<span class="text-xs" style="color:var(--muted)">空槓</span>`;
  box.innerHTML = html;
}

/* ---------- 統計 ---------- */
function epley1RM(w,r){ return r<=1 ? w : w*(1+r/30); }

function renderStats(){
  const chart = document.getElementById("weeklyChart");
  const now = new Date(); now.setHours(0,0,0,0);
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay()+6)%7));
  const weeks = [];
  for(let i=7;i>=0;i--){
    const start = new Date(monday); start.setDate(monday.getDate()-i*7);
    const end = new Date(start); end.setDate(start.getDate()+6);
    const s = start.toISOString().slice(0,10), e = end.toISOString().slice(0,10);
    const vol = state.logs.filter(l=>l.date>=s && l.date<=e).reduce((a,l)=>a+volumeOf(l),0);
    weeks.push({ label:(start.getMonth()+1)+"/"+start.getDate(), vol });
  }
  const max = Math.max(...weeks.map(w=>w.vol), 1);
  const W=320, H=150, pad=4, bw=W/8;
  let bars = "";
  weeks.forEach((w,idx)=>{
    const h = Math.round((w.vol/max)*(H-30));
    const x = idx*bw+pad, y = H-20-h;
    bars += `<rect x="${x}" y="${y}" width="${bw-pad*2}" height="${Math.max(h,2)}" rx="4" fill="${idx===7?"#B8935B":"#CBD5CE"}"/>`;
    if(w.vol>0) bars += `<text x="${x+(bw-pad*2)/2}" y="${y-5}" text-anchor="middle" font-size="8.5" fill="#737F76" font-family="Big Shoulders Display">${w.vol>=1000?(w.vol/1000).toFixed(1)+"k":w.vol}</text>`;
    bars += `<text x="${x+(bw-pad*2)/2}" y="${H-6}" text-anchor="middle" font-size="8.5" fill="#737F76" font-family="Big Shoulders Display">${w.label}</text>`;
  });
  chart.innerHTML = `<svg viewBox="0 0 ${W} ${H}" class="w-full">${bars}</svg>`;

  const box = document.getElementById("prList");
  const rows = state.exercises.map(e=>{
    const logs = state.logs.filter(l=>l.exId===e.id);
    if(!logs.length) return null;
    const maxW = logs.reduce((a,l)=>Math.max(a,l.weight),0);
    const best = logs.reduce((a,l)=> epley1RM(l.weight,l.reps) > epley1RM(a.weight,a.reps) ? l : a, logs[0]);
    const last = logs.slice().sort((a,b)=>a.date<b.date?1:-1)[0];
    return { name:e.name, maxW, e1rm:epley1RM(best.weight,best.reps), n:logs.length, lastDate:last.date };
  }).filter(Boolean).sort((a,b)=>b.maxW-a.maxW);
  if(!rows.length){
    box.innerHTML = `<div class="rounded-2xl p-6 text-center text-sm" style="background:var(--card);border:1px dashed var(--line);color:var(--muted)">累積紀錄後這裡會顯示各動作最佳表現</div>`;
    return;
  }
  box.innerHTML = rows.map(r=>`
    <div class="rounded-2xl p-3.5 flex items-center justify-between" style="background:var(--card);border:1px solid var(--line)">
      <div>
        <div class="font-bold text-sm">${escHtml(r.name)}</div>
        <div class="text-xs mt-0.5" style="color:var(--muted)">${r.n} 筆紀錄・最近 ${r.lastDate.replaceAll("-","/")}</div>
      </div>
      <div class="text-right">
        <div class="num text-xl font-black" style="color:var(--gold)">${r.maxW}<span class="text-xs" style="color:var(--muted)"> kg 最重</span></div>
        <div class="num text-xs" style="color:var(--muted)">估計 1RM ≈ ${r.e1rm.toFixed(1)} kg</div>
      </div>
    </div>`).join("");
}

/* ---------- 動作庫工具：分類／器材名稱正規化（id 或中文標籤皆可辨識） ---------- */
function normalizeCat(catRaw){
  const found = CATS.find(c=>c.id===catRaw || c.label===String(catRaw||"").trim());
  return found ? found.id : null;
}
function normalizeEquip(equipRaw){
  const found = EQUIPS.find(eq=>eq.id===equipRaw || eq.label===String(equipRaw||"").trim());
  return found ? found.id : null;
}
/* 將 Excel 讀出的原始列，正規化並去除空白名稱／重複名稱（保留第一筆） */
function normalizeExcelRows(rows){
  const seen = new Set();
  const list = [];
  rows.forEach(item=>{
    const name = String((item && (item.動作名稱 ?? item.name)) || "").trim();
    if(!name || seen.has(name)) return;
    seen.add(name);
    const equipRaw = (item && (item.器材 ?? item.equip)) ?? "";
    const catRaw = (item && (item.分類 ?? item.cat)) ?? "";
    const equip = normalizeEquip(equipRaw) || EQUIPS[0].id;
    const eq = equipObj(equip);
    const cat = eq.grouped ? (normalizeCat(catRaw) || CATS[0].id) : CATS[0].id;
    list.push({ name, cat, equip });
  });
  return list;
}

/* 模式一：只新增現有以外的動作，完全保留現有動作（不更新分類／器材） */
async function applyExcelAddOnly(list){
  const toAdd = list.filter(x=> !state.exercises.some(e=>e.name===x.name));
  if(!toAdd.length){ await showAlert("Excel 中沒有新的動作可新增（可能都已存在）"); return; }
  const ok = await showConfirm(
    `將新增 ${toAdd.length} 個動作：${toAdd.map(x=>x.name).join("、")}\n\n現有動作不會被更動。`,
    { title:"確認新增", confirmText:"新增" }
  );
  if(!ok) return;
  toAdd.forEach(x=> state.exercises.push({ id: uid(), name:x.name, cat:x.cat, equip:x.equip }));
  afterExerciseChange();
  await showAlert(`已新增 ${toAdd.length} 個動作。`);
}

/* 模式二：覆蓋，動作庫整個換成 Excel 內容。
   為了不讓「訓練紀錄」失去對應動作名稱，同名動作會沿用原本的 id（只更新分類／器材），
   只有真的不在 Excel 裡的現有動作才會被移除（其歷史紀錄仍會保留，但動作名稱會顯示為「（已刪除動作）」）。 */
async function applyExcelOverwrite(list){
  if(!list.length){ await showAlert("Excel 中沒有可用的動作資料"); return; }
  const newByName = new Map(list.map(x=>[x.name, x]));
  const toRemove = state.exercises.filter(e=>!newByName.has(e.name));
  const toAddCount = list.filter(x=>!state.exercises.some(e=>e.name===x.name)).length;
  const toKeepCount = list.length - toAddCount;

  let msg = `覆蓋後動作庫將變為 ${list.length} 個動作（沿用現有 ${toKeepCount} 個、新增 ${toAddCount} 個）。`;
  if(toRemove.length){
    msg += `\n\n以下 ${toRemove.length} 個現有動作不在 Excel 中，將被移除：${toRemove.map(e=>e.name).join("、")}`;
    const removedHasLogs = toRemove.filter(e=> state.logs.some(l=>l.exId===e.id));
    if(removedHasLogs.length){
      msg += `\n\n⚠️ 「${removedHasLogs.map(e=>e.name).join("、")}」已有歷史訓練紀錄，移除後紀錄仍會保留，但動作名稱會顯示為「（已刪除動作）」。`;
    }
  }
  const ok = await showConfirm(msg, { title:"確認覆蓋動作庫", confirmText:"確定覆蓋", danger:true });
  if(!ok) return;

  const existingByName = new Map(state.exercises.map(e=>[e.name, e]));
  state.exercises = list.map(x=>{
    const existing = existingByName.get(x.name);
    return existing
      ? { id: existing.id, name:x.name, cat:x.cat, equip:x.equip }
      : { id: uid(), name:x.name, cat:x.cat, equip:x.equip };
  });
  if(!state.exercises.find(e=>e.id===selectedExId)){
    selectedExId = state.exercises.length ? state.exercises[0].id : null;
  }
  afterBulkChange();
  await showAlert(`覆蓋完成，共 ${state.exercises.length} 個動作。`);
}

/* ---------- 雲端同步（Google Apps Script） ---------- */
/* 與耗材領用暨庫存管理系統共用同一份試算表／同一支部署網址，
   以 SYSTEM_KEY 區隔專屬分頁（iron_log_data），不會互相覆蓋。
   比照耗材領用系統，不需密碼，開啟頁面即自動同步。 */
const GAS_URL = "https://script.google.com/macros/s/AKfycbyq-XptFRw6ztLs5LXLR4v_STih0oUkf6SPWD8LWrTjtce74MmWSO92KKbcgQbfddP9vg/exec";
const SYSTEM_KEY = "iron_log_data";

const GAS_LASTSYNC_KEY = "ironLog_lastSync";

const syncPill = document.getElementById("syncPill");

/* 狀態藥丸：synced(綠) / syncing(黃) / offline(紅) / pulled(藍，短暫顯示) */
let pillResetTimer = null;
function setSyncStatus(mode){
  if(!syncPill) return;
  const MAP = {
    synced:  { text:"☁️ 已同步",      bg:"var(--accent-soft)", color:"var(--accent)" },
    syncing: { text:"⏳ 同步中...",    bg:"var(--gold-soft)",   color:"var(--gold)" },
    offline: { text:"⚠️ 離線 / 未同步", bg:"var(--danger-soft)", color:"var(--danger)" },
    pulled:  { text:"📥 發現新資料...", bg:"#E5EEF7",             color:"#4A6FA0" }
  };
  const m = MAP[mode] || MAP.offline;
  syncPill.textContent = m.text;
  syncPill.style.background = m.bg;
  syncPill.style.color = m.color;
  clearTimeout(pillResetTimer);
  if(mode==="pulled"){
    pillResetTimer = setTimeout(()=> setSyncStatus("synced"), 1600);
  }
}

function markSyncedNow(){
  localStorage.setItem(GAS_LASTSYNC_KEY, String(Date.now()));
}

/* 推送：非同步、避免觸發 CORS 預檢，POST body 不設 Content-Type（GAS 端以 e.postData.contents 解析） */
let pushTimer = null;
function schedulePush(){
  clearTimeout(pushTimer);
  pushTimer = setTimeout(()=> pushToCloud(), 700);
}
async function pushToCloud(){
  setSyncStatus("syncing");
  try{
    const res = await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({ system: SYSTEM_KEY, data: state })
    });
    const json = await res.json().catch(()=>null);
    if(json && json.ok){
      markSyncedNow();
      setSyncStatus("synced");
    } else {
      setSyncStatus("offline");
    }
  }catch(err){
    setSyncStatus("offline");
  }
}

/* 下載：比對雲端與本地 updatedAt，雲端較新才覆蓋本地（Last-Write-Wins） */
async function pullFromCloud(){
  setSyncStatus("syncing");
  try{
    const res = await fetch(`${GAS_URL}?system=${encodeURIComponent(SYSTEM_KEY)}`);
    const json = await res.json().catch(()=>null);
    if(!json || !json.ok){ setSyncStatus("offline"); return; }
    if(!json.data){
      // 雲端回應正常，但分頁還是空的（例如剛啟用同步）：直接把本機資料上傳，建立雲端起始版本，
      // 這不是連線失敗，不應該顯示「離線」。
      await pushToCloud();
      return;
    }
    const cloudData = json.data;
    const cloudUpdatedAt = cloudData.updatedAt || 0;
    const localUpdatedAt = state.updatedAt || 0;
    if(cloudData.exercises && cloudData.logs && cloudUpdatedAt > localUpdatedAt){
      state = sanitizeState(cloudData);
      persistLocal();
      if(!state.exercises.find(e=>e.id===selectedExId)){
        selectedExId = state.exercises.length ? state.exercises[0].id : null;
      }
      rerenderAll();
      updateSelectedExDisplay();
      setSyncStatus("pulled");
    } else {
      setSyncStatus("synced");
    }
    markSyncedNow();
  }catch(err){
    setSyncStatus("offline");
  }
}

/* App 開啟／從背景切回時自動檢查雲端是否有新資料 */
document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState === "visible") pullFromCloud();
});

function switchTab(tab){

  if(!panel) return;
  if(tab==="log"){ renderEquipToggle(); renderExPicker(); renderTodayList(); renderPlateCalc(); }
  if(tab==="history") renderHistory();
  if(tab==="stats") renderStats();
  if(tab==="manage"){ renderManageEquipToggle(); renderExManage(); }
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("active", b.dataset.tab===tab));
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
  panel.classList.add("active");
  window.scrollTo({top:0,left:0,behavior:"instant"});
}

  btn.addEventListener("click", ()=> switchTab(btn.dataset.tab));
